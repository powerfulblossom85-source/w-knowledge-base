title: Wedgie Knowledge Base
description: Community resource for wedgie definitions, examples, techniques, bios, safety tips, and more.

remote_theme: just-the-docs/just-the-docs  # This loads the theme remotely

plugins:
  - jekyll-remote-theme  # Required for remote_theme to work on GitHub Pages

# Enable navigation/sidebar globally
nav_enabled: true          # ← This is often missing; turns on side menu everywhere
search_enabled: true

# Optional but recommended
color_scheme: auto         # or "dark" / "light"
aux_links:
  GitHub Repo: https://github.com/powerfulblossom85-source/w-knowledge-source
